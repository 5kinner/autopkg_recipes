Description: |
  Downloads the Staged version of CLO Network Auth from a local file share.
Identifier: com.github.5kinner-recipes.download.CLO

Input:
  NAME: Rhino
  SEARCH_STRING: CLO
  MAJOR_VERSION: ''
  NAME_LIMITATION: ''
  NAME_EXCEPTION: ''
  FILE_SHARE: /Path/to/fileshare/
  VERSION_STRING_SEPARATOR: '_'
  MAX_FOLDER_DEPTH: '2'

Process:
- Processor: FileFinder
  Arguments:
    pattern: '%RECIPE_CACHE_DIR%/manual_download/*.dmg'